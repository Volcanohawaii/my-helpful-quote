<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destiny Lab</title>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data:; style-src * 'unsafe-inline';">
  <style>
    * { box-sizing: border-box; }
   :root { --bg: #F0EDE9; --paper: #FFFFFF; --primary: #243447; --accent: #9A8467; --text: #000000; --border: #D1CDC5; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; position: relative; }
    body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background-image: radial-gradient(circle at center, rgba(255, 255, 255, 1) 1.2px, transparent 2px), radial-gradient(circle at center, rgba(154, 132, 103, 0.9) 2px, transparent 4px); background-size: 60px 60px, 140px 140px; background-position: 0 0, 30px 30px; opacity: 1; animation: twinkle 4s ease-in-out infinite alternate; }
    @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
    .lang-toggle { position: absolute; top: -50px; right: 0; display: flex; gap: 15px; }
    .flag { font-size: 1.6rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
    .flag.active { opacity: 1; transform: scale(1.2); }
    .report-card { background: var(--paper); padding: 55px 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border: 1px solid var(--border); text-align: center; position: relative; animation: fadeIn 0.8s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .official-seal { position: absolute; top: 25px; right: 25px; width: 65px; height: 65px; border: 2px double var(--accent); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Gowun Batang'; font-size: 0.7rem; font-weight: 700; opacity: 0.5; transform: rotate(12deg); }
    h1 { font-family: 'Gowun Batang'; font-size: 1.4rem; color: var(--primary); margin-bottom: 10px; }
    .summary-line { font-family: 'Pretendard', sans-serif; font-size: 0.95rem; color: var(--text); margin-bottom: 30px; line-height: 1.7; text-align: left; }
    .tab-content { text-align: left; line-height: 1.8; font-size: 0.95rem; }
    .section-wrap { margin-bottom: 30px; }
    .section-title { font-family: 'Gowun Batang'; font-size: 1rem; color: var(--accent); display: block; margin-bottom: 12px; font-weight: 700; border-bottom: 1px solid #F0F0F0; }
    .info-box { background: #F9F8F6; padding: 18px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
    .warning-box { background: #FFF5F5; padding: 15px; border-radius: 8px; font-size: 0.85rem; color: #C0392B; margin-top: 25px; }
    .tabs { display: flex; border-bottom: 1px solid #EEE; margin: 25px 0; }
    .tab-btn { flex: 1; padding: 12px 0; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: #BBB; font-family: 'Gowun Batang'; }
    .tab-btn.active { color: var(--primary); font-weight: 700; border-bottom: 2px solid var(--primary); }
    .btn-action { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 1rem; }
    .hidden { display: none; }
    input { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-bottom: 1px solid #DDD; font-size: 1.1rem; outline: none; background: transparent; }
    .visitor-counter { margin-top: 25px; font-size: 0.75rem; color: #AAA; font-family: 'Gowun Batang'; border-top: 1px solid #F5F5F5; padding-top: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(240, 237, 233, 0.96); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .15s ease; }
    #loading-overlay.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">
  <div id="loading-overlay">
    <div style="background:white; padding:20px; border-radius:15px; text-align:center; width:100%; max-width:340px;">
      <div class="official-seal" style="position:static; margin:0 auto 20px auto;">분석중</div>
      <h2 style="font-family:'Gowun Batang'; color:var(--primary); font-size:1.1rem;">수리성명학 운명과 에너지를 조합 중...</h2>
      <div style="border:3px solid #f3f3f3; border-top:3px solid var(--accent); border-radius:50%; width:24px; height:24px; animation:spin 1s linear infinite; margin:0 auto 20px auto;"></div>
      <!-- 로딩 광고 슬롯 -->
      <div style="min-height: 250px; display: flex; justify-content: center; align-items: center;">
        <ins class="kakao_ad_area" style="display:none;" 
             data-ad-unit="DAN-pMoVBneQCSicnBZ7" 
             data-ad-width="300" data-ad-height="250"></ins>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="lang-toggle">
      <span class="flag active" id="flag-ko" onclick="setLang('ko')">🇰🇷</span>
      <span class="flag" id="flag-en" onclick="setLang('en')">🇺🇸</span>
    </div>

    <div class="report-card" id="view-home">
      <div class="official-seal">운명공학<br>분석실</div>
     <h1 id="ui-title">수리성명학 데이터 분석</h1> <!-- 이 줄 수정 -->
  <p id="ui-desc" style="font-size:0.85rem; color:#888; margin-bottom:40px;">
    성명의 파동과 탄생 시계열 지표를 바탕으로 81수리 체계를 분석합니다. 당신의 시그니처 에너지 구조가 도출됩니다.
  </p>
      <input type="text" id="userName" placeholder="성함" autocomplete="name">
      <input type="text" id="userBirth" placeholder="양력 8자리 19901208" inputmode="numeric" autocomplete="bday">
      <button class="btn-action" id="ui-btn" onclick="startAnalysis()">리포트 생성하기</button>
      <!-- 메인 하단 광고 슬롯 -->
      <div style="margin-top: 25px; min-height: 50px; display: flex; justify-content: center;">
        <ins class="kakao_ad_area" style="display:none;" 
             data-ad-unit="DAN-gySJpKsnNTQ1FIIF" 
             data-ad-width="320" data-ad-height="50"></ins>
      </div>
      <div class="visitor-counter">분석 완료된 운명: <span id="visit-count">...</span>건</div>
    </div>

    <div class="report-card hidden" id="view-result">
      <div class="official-seal">정식분석본</div>
      <h1 id="dynamic-title">분석 리포트</h1>
      <div class="summary-line" id="dynamic-summary">분석 중...</div>
      <div class="tabs">
        <button class="tab-btn active" id="tab1" onclick="switchTab('fortune', this)">현생 분석서</button>
        <button class="tab-btn" id="tab2" onclick="switchTab('past', this)">전생 기록서</button>
        <button class="tab-btn" id="tab3" onclick="switchTab('next', this)">내세 예약서</button>
      </div>
      <div id="reportDetail"></div>
      <button class="btn-action" style="margin-top:30px; background:white; color:#444; border:1px solid #DDD;" onclick="copyLink()">Copy Link</button>
      <p onclick="location.href=location.pathname" style="font-size:0.7rem; color:#CCC; margin-top:20px; cursor:pointer;">Reset</p>
    </div>
  </div>

  <script src="./quotes.js?v=4"></script>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>

<script>
    let currentLang = 'ko';
    const elements = ["목(木)", "화(火)", "토(土)", "금(金)", "수(水)"];

    // 방문자 카운터
    async function updateCounter() { 
      const el = document.getElementById('visit-count'); 
      if (!el) return;
      try { 
        const res = await fetch('https://api.counterapi.dev/v1/volcanohawaii-lab/main-counter/up'); 
        if (res.ok) {
          const data = await res.json(); 
          if (data && typeof data.count === "number") { el.innerText = Number(data.count).toLocaleString(); }
        }
      } catch (e) { el.innerText = "1,248"; } 
    }
    updateCounter();

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
      document.getElementById(`flag-${lang}`).classList.add('active');
      const t = i18n[lang];
      document.getElementById('ui-title').innerText = t.title;
      document.getElementById('ui-desc').innerText = t.desc;
      document.getElementById('userName').placeholder = t.nameLabel;
      document.getElementById('userBirth').placeholder = t.birthLabel;
      document.getElementById('ui-btn').innerText = t.btn;
      document.getElementById('tab1').innerText = t.tab1Btn;
      document.getElementById('tab2').innerText = t.tab2Btn;
      document.getElementById('tab3').innerText = t.tab3Btn;
    }

    function startAnalysis() {
      const n = document.getElementById('userName').value.trim();
      const b = document.getElementById('userBirth').value.trim().replace(/\D/g, '');
      if (!n || b.length !== 8) { alert(currentLang === 'ko' ? "정보를 확인해주세요." : "Check info."); return; }
      document.getElementById('loading-overlay').classList.add('show');
      setTimeout(() => {
        document.getElementById('loading-overlay').classList.remove('show');
        processData(n, b);
      }, 2000);
    }

    function getHangulOnset(char) {
      const code = char.charCodeAt(0) - 44032;
      if (code < 0 || code > 11171) return char;
      return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor(code / 588)];
    }

function processData(name, birth) {
    const nameVal = name.split('').reduce((a, ch) => a + ch.charCodeAt(0), 0);
    const birthVal = parseInt(birth, 10);
    const seed = nameVal + birthVal;
    const num81 = (seed % 81) + 1;

    let sc = [30, 30, 30, 30, 30]; // 기본 에너지

    // 1. 이름 가중치 (성명학 핵심: +75)
    for (let char of name) {
        const onset = /[a-zA-Z]/.test(char) ? char.toUpperCase() : getHangulOnset(char);
        const el = hangulElements[onset] || alphabetElements[onset];
        if (el) {
            const idx = elements.indexOf(el); 
            if (idx !== -1) sc[idx] += 75; 
        }
    }

    // 2. 탄생 월 가중치 (선천 배경: +40) - 한 번만 실행되도록 수정
    const month = parseInt(birth.substring(4, 6), 10);
    const mIdx = [2, 0, 0, 2, 1, 1, 2, 3, 3, 2, 4, 4][month-1];
    sc[mIdx] += 40;

    const strongEl = elements[sc.indexOf(Math.max(...sc))];
    const sIdx = sc.map((s, i) => i).sort((a, b) => sc[a] - sc[b]);
    
    const sessionData = { 
        name, birth, num81, seed, 
        elementScores: sc, 
        strongEl, 
        lackEls: [elements[sIdx[0]], elements[sIdx[1]]] 
    };
    
    localStorage.setItem('destinySession', JSON.stringify(sessionData));
    renderSummary(sessionData);
    document.getElementById('view-home').classList.add('hidden');
    document.getElementById('view-result').classList.remove('hidden');
    switchTab('fortune');
}
    function renderSummary(data) {
      const month = parseInt(data.birth.substring(4, 6));
      // 언어에 따른 타이틀 설정
      document.getElementById('dynamic-title').innerText = currentLang === 'ko' ? `${data.name}님의 분석 리포트` : `${data.name}'s Analysis Report`;
      
      const labelSuri = currentLang === 'ko' ? '🔮수리 격 특징' : '🔮 Suri Character';
      const labelMonth = currentLang === 'ko' ? '💫탄생 월 특징' : '💫 Birth Month Factor';

      document.getElementById('dynamic-summary').innerHTML = `
        <div class="info-box" style="background:#F9F8F6; border:1px solid #EEE; color:#000; font-size:0.95rem;">
          <div style="display:flex; justify-content:space-between; border-bottom:1px solid #000; padding-bottom:8px; margin-bottom:15px;">
              <span style="font-weight:800;">DESTINY_LAB_2026</span>
              <span style="color:var(--accent); font-weight:800;">CODE: ${String(data.num81).padStart(2, '0')}</span>
          </div>
          <b>${labelSuri}</b> ${currentLang === 'ko' ? luckyTitles81[data.num81] : luckyTitles81En[data.num81]}
          <p style="margin-top:0; margin-bottom:15px; line-height:1.7;">${currentLang === 'ko' ? detailedDesc81[data.num81] : detailedDesc81En[data.num81]}</p>
          <div style="border-top:1px dashed #DDD; padding-top:15px;">
            <b>${labelMonth}</b>
            <p style="margin-top:0; line-height:1.7;">${birthMonthData[month][currentLang]}</p>
          </div>
        </div>`;
    }

function renderChart(scores) {
  const container = document.getElementById('radarChart'); 
  if (!container) return;
  const labels = currentLang === 'ko' ? ["목(木)", "화(火)", "토(土)", "금(金)", "수(水)"] : ["Wood", "Fire", "Earth", "Metal", "Water"];
  const cx = 110, cy = 110, r = 70;
  
  // 전통 성명학의 '균형' 기준점 (이 점수 근처일 때 가장 안정적임)
  const baseline = 100; 
  
  let poly = ""; 
  labels.forEach((_, i) => { 
    const a = (Math.PI * 2 / 5) * i - (Math.PI / 2); 
    
    // ✅ 성명학 공식 스케일링: 
    // 점수가 100(기준)보다 높으면 밖으로 뻗어나가고, 낮으면 안으로 들어옵니다.
    // 최대치와 최소치를 제한하여 그래프가 뚫고 나가거나 사라지는 것을 방지합니다.
    let v = (scores[i] / 150) * r; 
    v = Math.max(r * 0.2, Math.min(v, r * 1.1)); // 시각적 안정 범위 제한
    
    poly += `${cx + v * Math.cos(a)},${cy + v * Math.sin(a)} `; 
  });
  
  container.innerHTML = `<svg width="220" height="220" style="overflow:visible; display:block; margin:0 auto;">
    <circle cx="${cx}" cy="${cy}" r="${r * 0.4}" fill="none" stroke="#F0F0F0" stroke-dasharray="2,2"/>
    <circle cx="${cx}" cy="${cy}" r="${r * 0.7}" fill="none" stroke="#E0E0E0" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EEE"/>
    
    ${labels.map((l, i) => { 
      const a = (Math.PI * 2 / 5) * i - (Math.PI / 2); 
      const tx = cx + (r + 25) * Math.cos(a), ty = cy + (r + 25) * Math.sin(a); 
      return `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" fill="#555" font-size="11" font-weight="700">${l}</text>`; 
    }).join('')}
    
    <polygon points="${poly}" fill="rgba(154, 132, 103, 0.4)" stroke="#9A8467" stroke-width="3" stroke-linejoin="round"/>
  </svg>`;
}

    
   function switchTab(mode) {
  const body = document.getElementById('reportDetail');
  const session = JSON.parse(localStorage.getItem('destinySession'));
  if (!session) return;
  
  const t = i18n[currentLang]; 
  const birthMonth = parseInt(session.birth.substring(4, 6));
  
  // 탭 활성화 로직
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    if (mode === 'fortune' && b.id === 'tab1') b.classList.add('active');
    if (mode === 'past' && b.id === 'tab2') b.classList.add('active');
    if (mode === 'next' && b.id === 'tab3') b.classList.add('active');
  });

  // 계절 및 오행 추출
  let seasonName = currentLang === 'ko' ? "환절기(土)" : "the Change of Seasons(Earth)";
  let birthEl = "土";
  if ([2, 3].includes(birthMonth)) { seasonName = "봄(木)"; birthEl = "木"; }
  else if ([5, 6].includes(birthMonth)) { seasonName = "여름(火)"; birthEl = "火"; }
  else if ([8, 9].includes(birthMonth)) { seasonName = "가을(金)"; birthEl = "金"; }
  else if ([11, 12].includes(birthMonth)) { seasonName = "겨울(水)"; birthEl = "水"; }

 /* switchTab 함수 내의 mode === 'fortune' 부분을 이 코드로 완전히 덮어쓰세요 */
if (mode === 'fortune') {
    const r1 = suriPrescription.getRemedy(session.num81, [session.lackEls[0]], currentLang);
    const r2 = suriPrescription.getRemedy(session.num81, [session.lackEls[1]], currentLang);

    // 1. [매칭용 한자 추출] - 사용자님 데이터의 "목(木)"에서 "木"만 뽑아냅니다.
    const nameElKey = session.strongEl; 
    const elHanjaMap = { "목(木)": "木", "화(火)": "火", "토(土)": "土", "금(金)": "金", "수(水)": "水" };
    const nameElHanja = elHanjaMap[nameElKey] || "데이터오류";

    // 2. [탄생 배경 추출] - 태어난 달을 기준으로 배경 오행 설정
    let birthElHanja = "土";
    if ([2, 3].includes(birthMonth)) birthElHanja = "木";
    else if ([5, 6].includes(birthMonth)) birthElHanja = "火";
    else if ([8, 9].includes(birthMonth)) birthElHanja = "金";
    else if ([11, 12].includes(birthMonth)) birthElHanja = "水";

    // 3. [복구 완료] 사용자님의 25가지 시나리오 맵
    const interactionNarrative = {
        "木": { "木": "부족한 생명력을 중첩시켜 거대한 숲을 이루었고", "火": "태어난 계절의 잠재력을 불태워 찬란한 꽃을 피워냈으며", "土": "척박한 황무지에 뿌리를 내려 단단한 삶의 터전을 일구었고", "金": "강한 기운에 유연함을 더해 부러지지 않는 강인한 검을 벼렸으며", "水": "차가운 물을 흡수하여 생명력 넘치는 거대한 숲을 이루었고" },
        "火": { "木": "계절의 열기에 땔감을 더해 꺼지지 않는 불멸의 기상을 세웠고", "火": "치솟는 태양의 에너지를 모아 세상을 비추는 거대한 빛이 되었으며", "土": "뜨거운 열기로 대지를 구워 단단하고 견고한 성벽을 쌓았고", "金": "용암 같은 열기로 원석을 녹여 예리한 보검의 가치를 끌어냈으며", "水": "타오르는 열기를 냉철한 지성으로 다스려 평온한 오아시스를 완성했고" },
