<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destiny Lab</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://t1.daumcdn.net https://*.daumcdn.net https://display.ad.daum.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://api.countapi.xyz https://countapi.mileshilliard.com https://t1.daumcdn.net https://*.daumcdn.net https://display.adfit.kakao.com https://display.ad.daum.net; frame-src https://display.adfit.kakao.com https://t1.daumcdn.net https://*.daumcdn.net https://display.ad.daum.net; connect-src 'self' https://api.countapi.xyz https://countapi.mileshilliard.com https://display.ad.daum.net https://display.adfit.kakao.com https://aem-kakao-collector.onkakao.net;">
  <style>
    * { box-sizing: border-box; }
    :root { --bg: #F0EDE9; --paper: #FFFFFF; --primary: #243447; --accent: #9A8467; --text: #444444; --border: #D1CDC5; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; position: relative; }
    body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background-image: radial-gradient(circle at center, rgba(255, 255, 255, 1) 1.2px, transparent 2px), radial-gradient(circle at center, rgba(154, 132, 103, 0.9) 2px, transparent 4px); background-size: 60px 60px, 140px 140px; background-position: 0 0, 30px 30px; opacity: 1; animation: twinkle 4s ease-in-out infinite alternate; }
    @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
    .lang-toggle { position: absolute; top: -50px; right: 0; display: flex; gap: 15px; }
    .flag { font-size: 1.6rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
    .flag.active { opacity: 1; transform: scale(1.2); }
    .report-card { background: var(--paper); padding: 55px 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border: 1px solid var(--border); text-align: center; position: relative; animation: fadeIn 0.8s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .official-seal { position: absolute; top: 25px; right: 25px; width: 65px; height: 65px; border: 2px double var(--accent); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Gowun Batang'; font-size: 0.7rem; font-weight: 700; opacity: 0.5; transform: rotate(12deg); }
    h1 { font-family: 'Gowun Batang'; font-size: 1.4rem; color: var(--primary); margin-bottom: 10px; }
    .summary-line { font-family: 'Pretendard', sans-serif; font-size: 0.95rem; color: var(--text); margin-bottom: 30px; line-height: 1.7; text-align: left; }
    .tab-content { text-align: left; line-height: 1.8; font-size: 0.95rem; }
    .section-wrap { margin-bottom: 30px; }
    .section-title { font-family: 'Gowun Batang'; font-size: 1rem; color: var(--accent); display: block; margin-bottom: 12px; font-weight: 700; border-bottom: 1px solid #F0F0F0; }
    .info-box { background: #F9F8F6; padding: 18px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
    .warning-box { background: #FFF5F5; padding: 15px; border-radius: 8px; font-size: 0.85rem; color: #C0392B; margin-top: 25px; }
    .tabs { display: flex; border-bottom: 1px solid #EEE; margin: 25px 0; }
    .tab-btn { flex: 1; padding: 12px 0; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: #BBB; font-family: 'Gowun Batang'; }
    .tab-btn.active { color: var(--primary); font-weight: 700; border-bottom: 2px solid var(--primary); }
    .btn-action { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 1rem; }
    .hidden { display: none; }
    input { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-bottom: 1px solid #DDD; font-size: 1.1rem; outline: none; background: transparent; }
    .visitor-counter { margin-top: 25px; font-size: 0.75rem; color: #AAA; font-family: 'Gowun Batang'; border-top: 1px solid #F5F5F5; padding-top: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
     /* ✅ 로딩 오버레이:
    display:none 대신 opacity/visibility로 숨김(광고 로딩 안정) */
    #loading-overlay{
  position:fixed; inset:0; z-index:9999;
  background:rgba(240, 237, 233, 0.96);
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  pointer-events:none;
  transition: opacity .15s ease;
}#loading-overlay.show{
  opacity:1;
  pointer-events:auto;
}  </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">
 
<!-- ✅ 로딩 오버레이 -->
  <div id="loading-overlay">
    <div style="background:white; padding:20px; border-radius:15px; text-align:center; width:100%; max-width:340px;">
      <div id="load-seal" class="official-seal" style="position:static; margin-bottom:20px;">분석중</div>
      <h2 id="load-title" style="font-family:'Gowun Batang'; color:var(--primary); font-size:1.1rem;">운명의 에너지를 조합 중...</h2>
      <p id="load-desc" style="color:#888; font-size:0.8rem; margin-bottom:20px;">잠시 기다려 주세요.</p>
      <div style="margin:16px auto 10px; width:300px; height:250px; display:flex; justify-content:center;">
  <ins class="kakao_ad_area" style="display:block;width:100%;"
  data-ad-unit="DAN-pMoVBneQCSicnBZ7"
  data-ad-width="300"
  data-ad-height="250"></ins>  
</div>
    </div>
  </div>

  <div class="container">
    <div class="lang-toggle">
      <span class="flag active" id="flag-ko" onclick="setLang('ko')">🇰🇷</span>
      <span class="flag" id="flag-en" onclick="setLang('en')">🇺🇸</span>
    </div>

     <div class="report-card" id="view-home">
      <div class="official-seal">운명공학<br>분석실</div>
      <h1 id="ui-title">운명공학 데이터 분석</h1>
      <p id="ui-desc" style="font-size:0.85rem; color:#888; margin-bottom:40px;">성명과 탄생일을 기반으로 에너지를 분석합니다.</p>
      <input type="text" id="userName" placeholder="성함" autocomplete="name">
      <input type="text" id="userBirth" placeholder="양력 8자리 19901208" inputmode="numeric" autocomplete="bday">
      <button class="btn-action" id="ui-btn" onclick="startAnalysis()">리포트 생성하기</button>

      <div class="visitor-counter">분석 완료된 운명: <span id="visit-count">...</span>건</div>
<div style="margin-top: 28px; display: flex; justify-content: center;">
  <ins class="kakao_ad_area" style="display:block;"
    data-ad-unit="DAN-gySJpKsnNTQ1FIIF"
    data-ad-width="320"
    data-ad-height="50"></ins>
</div>
    </div>

    <div class="report-card hidden" id="view-result">
      <div class="official-seal">정식분석본</div>
      <h1 id="dynamic-title">성명학 분석 리포트</h1>
      <div class="summary-line" id="dynamic-summary">분석 중...</div>
      <div class="tabs">
        <button class="tab-btn active" id="tab1" onclick="switchTab('fortune', this)">현생 분석서</button>
        <button class="tab-btn" id="tab2" onclick="switchTab('past', this)">전생 기록서</button>
        <button class="tab-btn" id="tab3" onclick="switchTab('next', this)">내세 예약서</button>
      </div>
      <div id="tab-body"></div>
      <button class="btn-action" style="margin-top:30px; background:white; color:#444; border:1px solid #DDD;" onclick="copyLink()">Copy Link</button>
      <p onclick="location.href=location.pathname" style="font-size:0.7rem; color:#CCC; margin-top:20px; cursor:pointer;">Reset</p>
    </div>
  </div>

  <script src="./quotes.js?v=3"></script>
  <script type="text/javascript" src="https://t1.daumcdn.net/adfit/static/ad.js" async></script>
  
  <script>
    let currentLang = 'ko';
    let session = { name: '', birth: '', seed: 0, scores: [], nameReport: '', num81: 1 };
    const elements = ["木", "火", "土", "金", "水"];

    function assertDataset() { if (typeof i18n === 'undefined') { alert("데이터 로드 실패."); return false; } return true; }
    
    async function updateCounter() { 
      const el = document.getElementById('visit-count'); 
      try { 
        const res = await fetch('https://countapi.mileshilliard.com/api/v1/hit/volcanohawaii-my-helpful-quote-visits'); 
        const data = await res.json(); 
        el.innerText = Number(data.value).toLocaleString(); 
      } catch (e) { el.innerText = "—"; } 
    }

    function setLang(lang) { 
      if (!assertDataset()) return; 
      currentLang = lang; 
      document.querySelectorAll('.flag').forEach(f => f.classList.remove('active')); 
      document.getElementById(`flag-${lang}`).classList.add('active'); 
      const t = i18n[lang]; 
      document.getElementById('ui-title').innerText = t.title; 
      document.getElementById('ui-desc').innerText = t.desc; 
      document.getElementById('userName').placeholder = t.nameLabel; 
      document.getElementById('userBirth').placeholder = t.birthLabel; 
      document.getElementById('ui-btn').innerText = t.btn; 
      document.getElementById('tab1').innerText = t.tab1Btn; 
      document.getElementById('tab2').innerText = t.tab2Btn; 
      document.getElementById('tab3').innerText = t.tab3Btn; 
      if (session.name) processData(session.name, session.birth, { keepView: true }); 
    }

     function startAnalysis() {
  if (!assertDataset()) return;

  const n = document.getElementById('userName').value.trim();
  const b = document.getElementById('userBirth').value.trim().replace(/\D/g, '');

  if (!n || b.length !== 8) {
    alert("정보를 확인해주세요.");
    return;
  }

  // 로딩 표시
  document.getElementById('loading-overlay').classList.add('show');

  setTimeout(() => {
    document.getElementById('loading-overlay').classList.remove('show');

    processData(n, b);

    // 🔥 핵심: 결과 화면 뜬 뒤 광고 실행
    setTimeout(() => {
      if (window.adfit) window.adfit.display();
    }, 300);

  }, 2000);
}

    function getHangulOnset(char) { 
      const code = char.charCodeAt(0) - 44032; 
      if (code < 0 || code > 11171) return char; 
      const onsets = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ']; 
      return onsets[Math.floor(code / 588)]; 
    }

    function processData(name, birth, opts = {}) {
      const cleanName = name.replace(/<[^>]*>?/gm, '');
      session.name = cleanName;
      session.birth = birth;

      const nameVal = cleanName.split('').reduce((a, ch) => a + ch.charCodeAt(0), 0);
      const birthVal = parseInt(birth, 10);
      session.num81 = ((nameVal + birthVal) % 81) + 1;
      session.seed = nameVal + birthVal;

      let sc = [0, 0, 0, 0, 0]; 
      for (let i = 0; i < cleanName.length; i++) {
        const char = cleanName[i];
        const onset = /[a-zA-Z]/.test(char) ? char.toUpperCase() : getHangulOnset(char);
        const el = /[a-zA-Z]/.test(char) ? alphabetElements[onset] : hangulElements[onset];
        if (el && elements.includes(el)) sc[elements.indexOf(el)] += 50; 
      }

      const month = parseInt(birth.substring(4, 6), 10);
      if ([2, 3].includes(month)) sc[0] += 50; 
      else if ([5, 6].includes(month)) sc[1] += 50; 
      else if ([8, 9].includes(month)) sc[3] += 50; 
      else if ([11, 12].includes(month)) sc[4] += 50; 
      else if ([4, 7, 10, 1].includes(month)) sc[2] += 50; // 날카로운 土 분석

      session.scores = sc.map(s => s + 30);
      const maxIdx = session.scores.indexOf(Math.max(...session.scores));
      const minIdx = session.scores.indexOf(Math.min(...session.scores));
      const strongEl = elements[maxIdx];
      const res = nameNumerology[session.num81];
      const attrSource = currentLang === 'ko' ? elementAttributesKo : elementAttributesEn;
      
      const summaryHtml = currentLang === 'ko' ? `
          <div style="text-align:center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px;">
            <span style="font-size: 1.3rem; color: var(--primary);"><b>${cleanName}</b>님의 맞춤형 자료입니다.</span>
          </div>
          <div style="text-align:left; line-height: 1.8;">
            <b>1. 수리성명학:</b> <br>
            이름의 총체적 합인 <b>'${res.title}'</b>(총81수)의 기운이 인생의 규모와 형태를 결정합니다. <br>
            <span style="color:#666; font-size:0.85rem;">${res.desc}</span> <br><br>
            <b>2. 타고난 기질 (발음오행):</b> <br>
            성함 분석 결과, <b>'${strongEl}(${attrSource[strongEl].name})'</b>의 기운이 당신의 핵심 기질입니다. <br><br>
            <b>3. 환경과 조화 (계절오행):</b> <br>
            탄생하신 <b>${month}월</b>의 기운이 삶의 환경적 요인을 구성합니다.
          </div>` : `
          <div style="text-align:center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px;">
            <span style="font-size: 1.2rem; color: var(--primary);"><b>${cleanName}</b>'s Destiny Blueprint</span>
          </div>
          <div style="text-align:left; line-height: 1.6;">
            <b>1. Life Vessel:</b> <b>'${res.titleEn}'</b> energy defines your scope.<br>
            <span style="color:#666; font-size:0.85rem;">${res.descEn}</span><br><br>
            <b>2. Core Trait:</b> <b>'${strongEl}'</b> is your primary energy.<br><br>
            <b>3. Environment:</b> The energy of <b>Month ${month}</b> shapes your life.
          </div>`;

      document.getElementById('dynamic-summary').innerHTML = summaryHtml;
      session.nameReport = currentLang === 'ko' ? `성명학적으로 <b>${res.title}</b>입니다.` : `Numerologically: <b>${res.titleEn}</b>.`;

      if (!opts.keepView) {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
      }
      switchTab('fortune', document.getElementById('tab1'));
    }

    function renderChart() {
      const container = document.getElementById('radarChart'); if (!container) return;
      const labels = currentLang === 'ko' ? ["木", "火", "土", "金", "水"] : ["Wood", "Fire", "Earth", "Metal", "Water"];
      const cx = 110, cy = 110, r = 75;
      const maxIdx = session.scores.indexOf(Math.max(...session.scores));
      const themeColor = { "木": { f: "rgba(46, 204, 113, 0.4)", s: "#27ae60" }, "火": { f: "rgba(231, 76, 60, 0.4)", s: "#c0392b" }, "土": { f: "rgba(241, 196, 15, 0.4)", s: "#f39c12" }, "金": { f: "rgba(149, 165, 166, 0.4)", s: "#7f8c8d" }, "水": { f: "rgba(52, 152, 219, 0.4)", s: "#2980b9" } }[elements[maxIdx]] || { f: "rgba(154, 132, 103, 0.4)", s: "#9A8467" };
      let poly = ""; labels.forEach((_, i) => { const a = (Math.PI * 2 / 5) * i - (Math.PI / 2); const v = (session.scores[i] / 150) * r; poly += `${cx + v * Math.cos(a)},${cy + v * Math.sin(a)} `; });
      const textLabels = labels.map((l, i) => { const a = (Math.PI * 2 / 5) * i - (Math.PI / 2); const tx = cx + (r + 25) * Math.cos(a), ty = cy + (r + 25) * Math.sin(a); return `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" fill="#243447" font-size="12" font-weight="700">${l}</text>`; }).join('');
      container.innerHTML = `<svg width="220" height="220" viewBox="0 0 220 220" style="overflow:visible; display:block; margin:0 auto;"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EEE"/><circle cx="${cx}" cy="${cy}" r="${r/2}" fill="none" stroke="#F5F5F5"/>${textLabels}<polygon points="${poly}" fill="${themeColor.f}" stroke="${themeColor.s}" stroke-width="2.5"/></svg>`;
    }

   function switchTab(mode, btn) {
      if (!assertDataset()) return; 
      if (btn) { 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
      }
      const body = document.getElementById('tab-body'); 
      const t = i18n[currentLang]; 
      const n81 = session.num81; 
      const maxIdx = session.scores.indexOf(Math.max(...session.scores)); 
      const minIdx = session.scores.indexOf(Math.min(...session.scores)); 
      const strongEl = elements[maxIdx]; 
      const lackEl = elements[minIdx]; 
      const birthMonth = parseInt(String(session.birth || "").substring(4, 6), 10) || 1;

      if (mode === 'fortune') {
        const presSource = currentLang === 'ko' ? elementPrescriptions12 : enPrescriptions12;
        const attrSource = currentLang === 'ko' ? elementAttributesKo : elementAttributesEn;
        const sideSource = currentLang === 'ko' ? sideEffects : sideEffectsEn;

        // ✅ 1. 계절 판정 (월별 오행 매칭 완벽화)
        let seasonName = "";
        if ([2, 3].includes(birthMonth)) seasonName = "봄(木)";
        else if ([5, 6].includes(birthMonth)) seasonName = "여름(火)";
        else if ([8, 9].includes(birthMonth)) seasonName = "가을(金)";
        else if ([11, 12].includes(birthMonth)) seasonName = "겨울(水)";
        else seasonName = "환절기(土)"; // 4, 7, 10, 1월

        // ✅ 2. 부족한 기운별 날카로운 비유 (부족한 기운 lackEl에 맞게 출력)
        const lackMetaphors = {
          "木": "성장의 동력이 꺼져 결실을 맺지 못하는",
          "火": "열정이 식어 추진력을 잃고 방황하는",
          "土": "뿌리 내릴 땅(기반)이 없어 늘 불안하고 흔들리는",
          "金": "결단력이 마모되어 이도 저도 못하는 무딘 칼날 같은",
          "水": "지혜의 샘이 말라 융통성이 없고 고립되는"
        };

        // ✅ 3. 이름 팩트 체크 (부족한 기운이 이름에 진짜 없는지 확인)
        let nameHasLack = true;
        for (let i = 0; i < session.name.length; i++) {
          const char = session.name[i];
          const onset = /[a-zA-Z]/.test(char) ? char.toUpperCase() : getHangulOnset(char);
          const el = /[a-zA-Z]/.test(char) ? alphabetElements[onset] : hangulElements[onset];
          if (el === lackEl) { nameHasLack = false; break; }
        }

        const diagnosisMsg = currentLang === 'ko' 
          ? `<div style="color:#C0392B; font-weight:700; margin-bottom:10px; line-height:1.6;">"당신은 ${seasonName}에 태어났음에도 이름에 '${lackEl}(${attrSource[lackEl].name})'의 기운이 ${nameHasLack ? '전혀 없으니, ' : '턱없이 부족하여 '}${lackMetaphors[lackEl]} 형국입니다."</div>`
          : `<div style="color:#C0392B; font-weight:700; margin-bottom:10px;">"Born in ${seasonName}, your destiny lacks ${lackEl} energy, making your foundation unstable."</div>`;

        // 화면 렌더링 (t.sec1, t.sec2 번호 정렬 반영)
        body.innerHTML = `
          <div class="tab-content">
            <div class="section-wrap">
              <span class="section-title">${t.sec1}</span>
              <div class="info-box" style="text-align:center;">
                <div id="radarChart" style="margin:20px auto; width:220px; height:220px;"></div>
                <div style="text-align:left; margin-top:15px;">
                  <div>• <b>주된 에너지:</b> ${attrSource[strongEl].name}</div>
                  <div>• <b>${t.advise}:</b> ${presSource[strongEl][session.tierStrong]}</div>
                </div>
              </div>
            </div>
            <div class="section-wrap">
              <span class="section-title">${t.sec2}</span>
              <div class="info-box">
                ${diagnosisMsg} 
                <div style="margin-top:15px; padding-top:15px; border-top:1px dashed #DDD;">
                  • <b>${t.practice}:</b> ${presSource[lackEl][session.tierLack]}
                </div>
              </div>
            </div>
            <div class="warning-box"><b>⚠️ ${t.sideEffect}</b><br>${sideSource[Math.abs(session.seed) % sideSource.length]}</div>
          </div>`;
        setTimeout(renderChart, 100);
      }
      
      } else if (mode === 'past') {
  const p = (currentLang === 'ko' ? pastLifeData : pastLifeDataEn)[n81 - 1];
  const pastName = (currentLang === 'ko') 
    ? makePastNameKo(n81, strongEl, lackEl, birthMonth) 
    : makePastNameEn(n81, strongEl, lackEl, birthMonth);

  body.innerHTML = `
    <div class="tab-content">
      <span class="section-title">${t.tab2Title}</span>
      <div class="info-box">
        <b>🏷️ 전생 이름</b><br>[${pastName}]<br><br>
        <b>📜 ${t.pastJob}</b><br>[${p.job}]<br>${p.desc}<br><br>
        <b>✨ ${t.pastHomework}</b><br>${p.homework}
      </div>
    </div>`;
} else if (mode === 'next') {
  const r = (currentLang === 'ko' ? reincarnationData : reincarnationDataEn)[n81 - 1];
  const finalCat = pickCategoryByElement(strongEl, lackEl, n81);
  const pool = (currentLang === 'ko' ? nextObjectPoolsKo : nextObjectPoolsEn)[finalCat];
  const finalObject = pool[n81 % pool.length];
  const nextLifeName = (currentLang === 'ko') 
    ? makeNextLifeNameKo(n81, strongEl, lackEl, birthMonth) 
    : makeNextLifeNameEn(n81, strongEl, lackEl, birthMonth);

  body.innerHTML = `
    <div class="tab-content">
      <span class="section-title">${t.tab3Title}</span>
      <div class="info-box">
        <b>🏷️ 다음생 이름</b><br>[${nextLifeName}]<br><br>
        <b>📍 ${t.nextDest}</b><br>${r.place}<br><br>
        <b>🧩 다음 생명체</b><br>[${finalObject}]<br><br>
        <b>✅ ${t.nextMission}</b><br>${r.mission}
      </div>
    </div>`;
}
}      
    

    async function copyLink() { const base = window.location.origin + window.location.pathname; const url = base + `?name=${encodeURIComponent(session.name)}&birth=${encodeURIComponent(session.birth)}&lang=${encodeURIComponent(currentLang)}`; try { await navigator.clipboard.writeText(url); alert("복사되었습니다!"); } catch { const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert("복사되었습니다!"); } }
    function initFromQuery() { if (!assertDataset()) return; const p = new URLSearchParams(window.location.search); const qLang = p.get('lang'), qName = p.get('name'), qBirth = p.get('birth'); if (qLang) setLang(qLang); if (qName) document.getElementById('userName').value = qName; if (qBirth) document.getElementById('userBirth').value = qBirth; if (qName && qBirth && qBirth.length === 8) processData(qName, qBirth); }
    window.addEventListener('DOMContentLoaded', () => { updateCounter(); setLang('ko'); initFromQuery(); });
    window.addEventListener('load', () => {
  if (window.adfit) window.adfit.display();
});
